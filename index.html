<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>麻的小辛辣。績效評核系統</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="app-header">
      <img class="brand-logo" src="assets/logo.png" alt="麻的小辛辣" />
      <div class="app-subtitle">績效評核系統</div>
    </header>

    <!-- 同仁互評區（預設顯示） -->
    <div id="evalSection">
      <!-- 登入閘 -->
      <div id="loginGate" class="card">
        <p>請先登入再進行評鑑 🔑</p>
        <label>帳號 <input id="acc" autocomplete="off" /></label><br /><br />
        <label>密碼 <input id="pw" type="password" autocomplete="new-password" /></label>
        <button id="loginBtn">登入</button>
        <div id="loginErr" class="msg err" style="display:none"></div>
      </div>
      <!-- 評鑑表單（登入後顯示） -->
      <div id="evalForm" style="display:none">
        <details id="intro" class="card intro" open>
          <summary>📣 給大家的話</summary>
          <div id="introBody"></div>
        </details>
        <div class="hellobar">
          <span id="hello" class="muted"></span>
          <details id="pwBox" class="pwbox">
            <summary>🔑 修改密碼</summary>
            <div class="card pwcard">
              <label>新密碼 <input id="newPw" type="password" autocomplete="new-password" /></label><br /><br />
              <label>確認新密碼 <input id="newPw2" type="password" autocomplete="new-password" /></label><br /><br />
              <button id="savePw">儲存</button>
              <span id="pwMsg" class="muted"></span>
            </div>
          </details>
        </div>
        <div class="tabs">
          <button id="btnFill" class="tab active">填寫評鑑</button>
          <button id="btnSelf" class="tab">自評</button>
          <button id="btnMyScores" class="tab">我的成績</button>
        </div>

        <!-- 填寫區 -->
        <div id="fillPane">
          <div id="fillBanner" class="card"></div>
          <p id="fillHint" class="muted">點同仁姓名展開，選「職能態度／職能表現」再點開細項評分。星等說明可展開參考 ⭐️</p>
          <div id="forms"></div>
          <div id="errors" class="msg err" style="display:none"></div>
          <button id="submit">送出評鑑</button>
          <div id="result" class="msg" style="display:none"></div>
        </div>

        <!-- 自評區 -->
        <div id="selfPane" style="display:none">
          <div id="selfBanner" class="card"></div>
          <p id="selfHint" class="muted">評自己一次，項目跟他評一樣。之後在「我的成績」可對照自評與大家的評價。</p>
          <div id="selfForms"></div>
          <div id="selfMsgs">
            <div class="card"><label>💌 想對下一季的自己說的話<br /><textarea id="selfNote" rows="2" style="width:100%"></textarea></label></div>
            <div class="card">
              <b>想對夥伴說的話</b> <span class="muted">（全匿名，不會公開是誰說的）</span>
              <div id="peerMsgs"></div>
              <button id="addPeerMsg" type="button" class="tab" style="margin-top:8px">＋ 新增夥伴</button>
            </div>
            <div class="card"><label>想對公司說的話<br /><textarea id="companyNote" rows="2" style="width:100%"></textarea></label></div>
          </div>
          <div id="selfErrors" class="msg err" style="display:none"></div>
          <button id="selfSubmit">送出自評</button>
          <div id="selfResult" class="msg" style="display:none"></div>
        </div>

        <!-- 我的成績區 -->
        <div id="scorePane" style="display:none"></div>
      </div>
    </div>

    <!-- 主管登入入口（低調） -->
    <div style="text-align:center; margin:28px 0 8px">
      <a href="#" id="adminEntry" class="muted">主管登入</a>
    </div>

    <!-- 管理區（預設隱藏，點主管登入才出現） -->
    <div id="adminSection" style="display:none">
      <div id="gate" class="card">
        <label>通行碼 <input id="pass" type="password" /></label>
        <button id="enter">進入</button>
        <div id="gateErr" class="msg err" style="display:none">通行碼錯誤</div>
      </div>
      <div id="panel" style="display:none">
        <div class="selectors card">
          <label>年度 <select id="adminYear"></select></label>
          <label>季度 <select id="adminQuarter"></select></label>
          <button id="btnPrint">列印 PDF</button>
        </div>
        <div id="printHeader" class="print-only"></div>
        <div id="progress" class="card"></div>
        <div id="overview" class="card"></div>
        <div id="detail" class="card"></div>
        <div id="companyMsgs" class="card"></div>
      </div>
    </div>
  </div>
  <script type="module" src="js/eval-page.js"></script>
  <script type="module" src="js/admin-page.js"></script>
</body>
</html>
